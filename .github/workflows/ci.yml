name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        shell: bash
        run: |
          source_dir="."
          if [[ ! -f CMakeLists.txt && -f SOURCE/CMakeLists.txt ]]; then
            source_dir="SOURCE"
          fi
          cmake -S "$source_dir" -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build
        run: |
          cmake --build build --config ${{ matrix.config }} -- -j 2
      - name: Run tests
        run: |
          if [ -f build/CTestTestfile.cmake ]; then ctest --test-dir build --output-on-failure; fi
        shell: bash
